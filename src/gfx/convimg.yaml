palettes:
  - name: global_palette
    fixed-entries:
      - color: {index: 0, r: 50, g: 52, b: 55}
      - color: {index: 1, r: 0, g: 0, b: 255}
      - color: {index: 2, r: 255, g: 255, b: 0}
      - color: {index: 3, r: 0, g: 255, b: 0}
      - color: {index: 4, r: 255, g: 130, b: 0}
      - color: {index: 5, r: 255, g: 0, b: 0}
      - color: {index: 6, r: 255, g: 255, b: 255}

outputs:
  - type: c
    include-file: gfx.h
    palettes:
      - global_palette

